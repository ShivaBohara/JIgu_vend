<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jigu Vend — Scan. Select. Collect.</title>
  <meta name="description" content="Scan the QR code on any Jigu Vend machine to browse products and pay right from your phone.">

  <!-- Social/WhatsApp link preview card -->
  <meta property="og:title" content="Jigu Vend">
  <meta property="og:description" content="Scan. Select. Collect. Smart vending, no touchscreen needed.">
  <meta property="og:image" content="https://qrbasedvend.netlify.app/assets/image/og-preview.png">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="assets/image/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header class="header">
    <h1>Jigu <span>Vend</span></h1>
    <p id="machine-label">machine: --</p>
  </header>

  <!-- This stays EMPTY in the HTML.
       JavaScript (render.js) fills this with product cards
       based on the machine ID in the URL. -->
  <main id="product-grid" class="product-grid">
    <!-- product cards get injected here -->
  </main>

  <p id="no-products-message" class="hidden">No products found for this machine.</p>

  <!-- Floating cart bar — hidden until at least 1 item is added -->
  <a id="cart-bar" href="cart.html" class="cart-bar hidden">
    <span id="cart-bar-count">0 items</span>
    <span id="cart-bar-total">Rs. 0</span>
    <span class="cart-bar-cta">View Cart →</span>
  </a>

  <!-- Floating keypad button — opens the quick product-number lookup -->
  <button id="quickpick-fab" class="quickpick-fab" aria-label="Find product by number">#</button>

  <!-- Quick-pick modal: type a slot number, jump straight to that product -->
  <div id="quickpick-modal" class="quickpick-modal hidden">
    <div class="quickpick-box">
      <div class="quickpick-header">
        <p>Find product by number</p>
        <button id="quickpick-close" class="quickpick-close-btn">✕</button>
      </div>
      <div id="quickpick-display" class="quickpick-display"></div>
      <div class="keypad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key key-clear" data-key="clear">Clear</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-back" data-key="back">DEL</button>
      </div>
      <button id="quickpick-go" class="go-btn">Find →</button>
    </div>
  </div>

  <script src="js/cart.js"></script>
  <script src="js/render.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/quickpick.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const p = new URLSearchParams(window.location.search);
      initQuickPick((p.get("machine") || "").toLowerCase());
    });
  </script>

</body>
</html>
